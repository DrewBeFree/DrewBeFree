<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drew's AI Dog Trainer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #2d5a27, #4a7c59);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      flex-shrink: 0;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .header-title span { font-size: 1.6rem; }

    .header-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .icon-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      padding: 8px 12px;
      font-size: 0.85rem;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .icon-btn:hover { background: rgba(255,255,255,0.28); }
    .icon-btn.active { background: rgba(255,200,0,0.35); color: #ffe566; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .bubble {
      max-width: 75%;
      border-radius: 16px;
      padding: 12px 16px;
      line-height: 1.55;
      font-size: 0.95rem;
      word-break: break-word;
      animation: popIn 0.18s ease;
    }

    @keyframes popIn {
      from { transform: scale(0.92); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .bubble.trainer {
      background: linear-gradient(135deg, #2d5a27, #3d7040);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .bubble.user {
      background: #2a2a4a;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      color: #c8d8ff;
    }

    .bubble .label {
      font-size: 0.72rem;
      font-weight: 600;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 4px;
    }

    .typing-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
      background: linear-gradient(135deg, #2d5a27, #3d7040);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      width: fit-content;
    }

    .dot {
      width: 8px; height: 8px;
      background: #a8d8a8;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    .quick-buttons {
      flex-shrink: 0;
      padding: 10px 14px 6px;
      background: #111128;
      border-top: 1px solid #2a2a44;
    }

    .quick-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #888;
      margin-bottom: 8px;
    }

    .btn-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .quick-btn {
      border: none;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      font-weight: 500;
      transition: transform 0.1s, filter 0.1s;
      white-space: nowrap;
    }

    .quick-btn:hover  { filter: brightness(1.15); }
    .quick-btn:active { transform: scale(0.95); }

    .quick-btn.good {
      background: #2d6a2d;
      color: #c8ffc8;
    }

    .quick-btn.bad {
      background: #6a2d2d;
      color: #ffc8c8;
    }

    .input-area {
      flex-shrink: 0;
      padding: 10px 14px 14px;
      background: #111128;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #msg-input {
      flex: 1;
      background: #22223a;
      border: 1px solid #3a3a5c;
      border-radius: 12px;
      color: #e8e8e8;
      font-size: 0.95rem;
      padding: 10px 14px;
      resize: none;
      line-height: 1.4;
      max-height: 120px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    #msg-input:focus { border-color: #4a7c59; }
    #msg-input::placeholder { color: #555; }

    .send-btn {
      background: linear-gradient(135deg, #2d5a27, #4a7c59);
      border: none;
      border-radius: 12px;
      color: #fff;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 10px 14px;
      transition: filter 0.2s, transform 0.1s;
      line-height: 1;
    }

    .send-btn:hover  { filter: brightness(1.2); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .mic-btn {
      background: #22223a;
      border: 1px solid #3a3a5c;
      border-radius: 12px;
      color: #aaa;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 10px 13px;
      transition: background 0.2s, color 0.2s;
      line-height: 1;
    }

    .mic-btn.listening {
      background: #6a1a1a;
      border-color: #ff4444;
      color: #ff8888;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(255,68,68,0); }
    }

    #status-bar {
      text-align: center;
      font-size: 0.75rem;
      color: #666;
      padding: 3px 0 0;
      min-height: 16px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #444;
      font-size: 0.95rem;
      pointer-events: none;
    }

    .empty-state .paw { font-size: 3rem; }

    @media (max-width: 480px) {
      .bubble { max-width: 90%; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <span>🐾</span> Drew's AI Dog Trainer
  </div>
  <div class="header-controls">
    <button class="icon-btn active" id="tts-btn" title="Toggle voice" onclick="toggleTTS()">🔊 Voice</button>
    <button class="icon-btn" id="clear-btn" title="New session" onclick="clearSession()">🗑 New</button>
  </div>
</header>

<div id="chat">
  <div class="empty-state" id="empty-state">
    <div class="paw">🐶</div>
    <div>Start a session to begin training!</div>
  </div>
</div>

<div class="quick-buttons">
  <div class="quick-label">Quick Report — what did the dog do?</div>
  <div class="btn-grid">
    <button class="quick-btn good" onclick="quickSend('The dog sat!')">✅ Sat</button>
    <button class="quick-btn good" onclick="quickSend('The dog stayed!')">✅ Stayed</button>
    <button class="quick-btn good" onclick="quickSend('The dog came when called!')">✅ Came</button>
    <button class="quick-btn good" onclick="quickSend('The dog gave their paw!')">✅ Gave paw</button>
    <button class="quick-btn good" onclick="quickSend('The dog lay down!')">✅ Lay down</button>
    <button class="quick-btn bad"  onclick="quickSend('The dog ignored the command.')">❌ Ignored</button>
    <button class="quick-btn bad"  onclick="quickSend('The dog barked.')">❌ Barked</button>
    <button class="quick-btn bad"  onclick="quickSend('The dog jumped up on me.')">❌ Jumped up</button>
    <button class="quick-btn bad"  onclick="quickSend('The dog got distracted and wandered off.')">❌ Distracted</button>
    <button class="quick-btn bad"  onclick="quickSend('The dog ran away.')">❌ Ran away</button>
  </div>
</div>

<div class="input-area">
  <textarea
    id="msg-input"
    rows="1"
    placeholder="Describe what happened, ask a question..."
    onkeydown="handleKey(event)"
    oninput="autoResize(this)"
  ></textarea>
  <button class="mic-btn" id="mic-btn" title="Voice input" onclick="toggleMic()">🎙</button>
  <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">➤</button>
</div>
<div id="status-bar"></div>

<script>
  // ── State ────────────────────────────────────────────────────────────────
  let ttsEnabled  = true;
  let isListening = false;
  let isSending   = false;
  let recognition = null;

  // ── Boot ─────────────────────────────────────────────────────────────────
  (async () => {
    const history = await fetchJSON('/api/history');
    if (history.length) {
      hideEmpty();
      history.forEach(m => appendBubble(m.role === 'user' ? 'user' : 'trainer', m.content));
      scrollBottom();
    } else {
      // Auto-start by sending an empty greeting trigger
      await sendRaw('Hello! Let\'s start a training session.');
    }
    setupSpeechRecognition();
  })();

  // ── API helpers ───────────────────────────────────────────────────────────
  async function fetchJSON(url, options) {
    const res = await fetch(url, options);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || res.statusText);
    }
    return res.json();
  }

  async function sendRaw(text) {
    if (isSending) return;
    isSending = true;
    hideEmpty();
    appendBubble('user', text);
    const indicator = showTyping();
    setStatus('Drew is thinking...');
    try {
      const data = await fetchJSON('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: text }),
      });
      removeTyping(indicator);
      appendBubble('trainer', data.response);
      scrollBottom();
      if (ttsEnabled) speak(data.response);
      setStatus('');
    } catch (e) {
      removeTyping(indicator);
      setStatus('Error: ' + e.message);
    } finally {
      isSending = false;
    }
  }

  // ── UI Actions ────────────────────────────────────────────────────────────
  function sendMessage() {
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if (!text || isSending) return;
    input.value = '';
    autoResize(input);
    sendRaw(text);
  }

  function quickSend(text) {
    if (isSending) return;
    sendRaw(text);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  async function clearSession() {
    if (!confirm('Start a new training session? History will be cleared.')) return;
    await fetchJSON('/api/history', { method: 'DELETE' });
    document.getElementById('chat').innerHTML = '';
    document.getElementById('chat').insertAdjacentHTML('beforeend',
      '<div class="empty-state" id="empty-state"><div class="paw">🐶</div><div>Starting new session…</div></div>');
    if (window.speechSynthesis) speechSynthesis.cancel();
    await sendRaw('Hello! Let\'s start a brand new training session with a different dog.');
  }

  // ── Bubbles ───────────────────────────────────────────────────────────────
  function hideEmpty() {
    const el = document.getElementById('empty-state');
    if (el) el.remove();
  }

  function appendBubble(role, text) {
    const chat = document.getElementById('chat');
    const div  = document.createElement('div');
    div.className = 'bubble ' + role;
    div.innerHTML = '<div class="label">' + (role === 'trainer' ? '🐾 Drew' : '👤 You') + '</div>'
      + escapeHtml(text).replace(/\n/g, '<br>');
    chat.appendChild(div);
    scrollBottom();
  }

  function showTyping() {
    const chat = document.getElementById('chat');
    const div  = document.createElement('div');
    div.className = 'typing-indicator';
    div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    chat.appendChild(div);
    scrollBottom();
    return div;
  }

  function removeTyping(el) { el?.remove(); }

  function scrollBottom() {
    const chat = document.getElementById('chat');
    chat.scrollTop = chat.scrollHeight;
  }

  function setStatus(msg) {
    document.getElementById('status-bar').textContent = msg;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  // ── TTS ───────────────────────────────────────────────────────────────────
  function toggleTTS() {
    ttsEnabled = !ttsEnabled;
    const btn = document.getElementById('tts-btn');
    btn.textContent = ttsEnabled ? '🔊 Voice' : '🔇 Muted';
    btn.classList.toggle('active', ttsEnabled);
    if (!ttsEnabled && window.speechSynthesis) speechSynthesis.cancel();
  }

  function speak(text) {
    if (!window.speechSynthesis) return;
    speechSynthesis.cancel();
    // Strip parenthetical tips so only the dog-facing speech is read aloud
    const cleaned = text.replace(/\([^)]*\)/g, '').replace(/\s{2,}/g, ' ').trim();
    const utt = new SpeechSynthesisUtterance(cleaned);
    utt.rate  = 1.05;
    utt.pitch = 1.1;
    // Prefer an energetic English voice if available
    const voices = speechSynthesis.getVoices();
    const pick   = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google'))
                || voices.find(v => v.lang.startsWith('en'))
                || voices[0];
    if (pick) utt.voice = pick;
    speechSynthesis.speak(utt);
  }

  // Wait for voices to load (Chrome needs this)
  if (window.speechSynthesis) speechSynthesis.onvoiceschanged = () => {};

  // ── Speech Recognition ────────────────────────────────────────────────────
  function setupSpeechRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      document.getElementById('mic-btn').title = 'Voice input not supported in this browser';
      document.getElementById('mic-btn').style.opacity = '0.4';
      return;
    }
    recognition = new SR();
    recognition.continuous    = false;
    recognition.interimResults = false;
    recognition.lang          = 'en-US';

    recognition.onresult = e => {
      const transcript = e.results[0][0].transcript;
      document.getElementById('msg-input').value = transcript;
      autoResize(document.getElementById('msg-input'));
      stopListening();
      sendMessage();
    };

    recognition.onerror = e => {
      setStatus('Mic error: ' + e.error);
      stopListening();
    };

    recognition.onend = () => stopListening();
  }

  function toggleMic() {
    if (!recognition) { setStatus('Speech recognition not supported'); return; }
    if (isListening) {
      recognition.stop();
    } else {
      if (window.speechSynthesis) speechSynthesis.cancel();
      recognition.start();
      isListening = true;
      document.getElementById('mic-btn').classList.add('listening');
      document.getElementById('mic-btn').textContent = '⏹';
      setStatus('Listening...');
    }
  }

  function stopListening() {
    isListening = false;
    const btn = document.getElementById('mic-btn');
    btn.classList.remove('listening');
    btn.textContent = '🎙';
    setStatus('');
  }
</script>
</body>
</html>
